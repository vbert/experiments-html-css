<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive SVG Toolbar</title>
    <link rel="stylesheet" href="style.css?5678901234">
</head>
<body>
    <div class="toolbar">
        <button class="toolbar-btn" title="Elektronika">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconElectronics"></use>
            </svg>
            <span>Elektronika</span>
        </button>

        <!-- <div class="toolbar-divider"></div> -->

        <button class="toolbar-btn" title="Nieruchomości">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconRealEstate"></use>
            </svg>
            <span>Nieruchomości</span>
        </button>

        <button class="toolbar-btn" title="Praca">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconJobs"></use>
            </svg>
            <span>Praca</span>
        </button>

        <button class="toolbar-btn" title="Motoryzacja">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconAutomotive"></use>
            </svg>
            <span>Motoryzacja</span>
        </button>

        <button class="toolbar-btn" title="Usługi">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconServices"></use>
            </svg>
            <span>Usługi</span>
        </button>

        <button class="toolbar-btn" title="Zwierzęta">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconAnimals"></use>
            </svg>
            <span>Zwierzęta</span>
        </button>

        <button class="toolbar-btn" title="Sport i hobby">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconSportsAndHobbies"></use>
            </svg>
            <span>Sport i hobby</span>
        </button>

        <button class="toolbar-btn" title="Dom i ogród">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconHomeAndGarden"></use>
            </svg>
            <span>Dom i ogród</span>
        </button>

        <button class="toolbar-btn" title="Oddam za darmo">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconFreeGiving"></use>
            </svg>
            <span>Oddam za darmo</span>
        </button>

        <button class="toolbar-btn" title="Edukacja">
            <svg class="classified-category-icon">

        </button>

        <button class="toolbar-btn" title="Różne">
            <svg class="classified-category-icon">

            </svg>
            <span>Różne</span>
        </button>

        <button class="toolbar-btn" title="RTV i AGD">
            <svg class="classified-category-icon">
                <use href="classified-icons.svg#iconConsumerElectronicsAndAppliances"></use>
            </svg>
            <span>RTV i AGD</span>
        </button>
    </div>
</body>
</html>
